<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time Utility</title>
    <link href="./style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 class="time"></h1>
    <h3 class="date"></h3>
    <div class="utils">
      <div class="stop-watch">
        <h2>Stop watch</h2>
        <h1 class="stop-watch-time">0.00</h1>
        <button type="button" id="stopwatch-start">Start</button>
        <button type="button" id="stopwatch-stop">Stop</button>
        <button type="button" id="stopwatch-reset">Reset</button>
      </div>
      <div class="timer">
        <h2>Timer</h2>
        <h1 class="timer-time">0.00</h1>
        <button type="button" id="timer-increment">Increment</button>
        <button type="button" id="timer-decrement">Decrement</button>
        <button type="button" id="timer-start">Start</button>
        <button type="button" id="timer-reset">Reset</button>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
